<body>

</div>

<canvas id="game" width="800" height="400"></canvas>

<div id="hud">
  <div class="hudRow">
    🔫 Ammo
    <div class="bar"><div id="ammoBar"></div></div>
  </div>
  <div class="hudRow">⭐ Score: <span id="scoreText">0</span></div>
  <div class="hudRow">🏆 High: <span id="highScoreText">0</span></div>
</div>

<div id="controlsBox">
<b>CONTROLS</b><br><br>
Move: WASD / Arrows<br>
Jump: W / ↑ / Space<br>
Dash: Shift<br>
Shoot: F<br>
Restart: R<br>
Pause: esc<br>
Toggle Menu: I<br>
#shnails4life
</div>

<script>
let paused = false;
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const box = document.getElementById("controlsBox");
const menu = document.getElementById("mainMenu");

function startGame(){
  menu.style.display="none";
  update();
}//globals

const gravity = 0.5;

let cameraX = 0;
let shake = 0;
let shakeX = 0;

let flash = 0;
let particles = [];

let worldX = 0;
let score = 0;

let highScore = Number(localStorage.getItem("shnailHighScore") || 0);

function addScore(amount){
  score += amount;
  if(score > highScore){
    highScore = score;
    localStorage.setItem("shnailHighScore", highScore);
  }
}

let coyoteTime = 0;
let jumpBuffer = 0;

let player = {
  x:100,y:200,w:30,h:30,
  dx:0,dy:0,
  speed:3,jump:10,
  grounded:false,jumps:0,
  canWallJump:false,
  facing:1,dash:0,
  spawnX:100,spawnY:200,
  ammo:10,maxAmmo:20
};

let platforms,enemies,coins,bullets,checkpoints,ammoCrates;
let enemyBullets = [];

function resetWorld(){
  platforms=[{x:0,y:350,w:1000,h:50}];
  enemies=[]; coins=[]; bullets=[]; checkpoints=[]; ammoCrates=[]; enemyBullets=[];
  worldX=0; score=0;

  player.x=100; player.y=200;
  player.spawnX=100; player.spawnY=200;
  player.dx=0; player.dy=0;
  player.ammo=10;

  coyoteTime=0; jumpBuffer=0;
}
resetWorld();

let keys={};

document.addEventListener("keydown",e=>{
  keys[e.code]=true;
  if(e.code === "Escape"){
  paused = !paused;
}
  if(e.code==="KeyR") resetWorld();
  if(e.code==="KeyI")
    box.style.display = box.style.display==="none"?"block":"none";

  if(e.code==="KeyF" && player.ammo>0){
    bullets.push({x:player.x+15,y:player.y+15,dx:player.facing*6});
    player.ammo--;
  }

  if(e.code==="Space" || e.code==="KeyW" || e.code==="ArrowUp"){
    jumpBuffer = 6;
  }
});

document.addEventListener("keyup",e=>keys[e.code]=false);

/* GAMEPAD */
let prevButtons = [];
function handleGamepad(){
  const gp = navigator.getGamepads()[0];
  if(!gp) return;
  const DEADZONE = 0.25;

  let move = gp.axes[0];
  if(Math.abs(move) > DEADZONE){
    let scaled = (Math.abs(move) - DEADZONE) / (1 - DEADZONE);
    scaled *= Math.sign(move);
    player.dx = scaled * player.speed;
    player.facing = move > 0 ? 1 : -1;
  }

  function pressed(btn){
    return gp.buttons[btn]?.pressed && !prevButtons[btn];
  }
  function held(btn){ return gp.buttons[btn]?.pressed; }

  if(pressed(3)) jumpBuffer = 6;

  if(pressed(2) && player.dash <= 0){
    player.dx = player.facing * 10;
    player.dash = 60;
  }

  if(held(7) && player.ammo > 0){
    if(!player.shootCooldown) player.shootCooldown = 0;
    if(player.shootCooldown <= 0){
      bullets.push({x:player.x+15,y:player.y+15,dx:player.facing*6});
      player.ammo--;
      player.shootCooldown = 10;
    }
  }

  if(pressed(9)) resetWorld();

  if(player.shootCooldown > 0) player.shootCooldown--;
  prevButtons = gp.buttons.map(b => b.pressed);
}

/* HUD */
function updateHUD(){
  let ammoPercent = (player.ammo / player.maxAmmo) * 100;
  document.getElementById("ammoBar").style.width = ammoPercent + "%";
  document.getElementById("scoreText").innerText = score;
  document.getElementById("highScoreText").innerText = highScore;
}

/* PARTICLES */
function spawnParticles(x,y,color,count=8){
  for(let i=0;i<count;i++){
    particles.push({
      x,y,
      dx:(Math.random()-0.5)*4,
      dy:(Math.random()-0.5)*4,
      life:30,
      color
    });
  }
}

function updateParticles(){
  particles.forEach(p=>{
    p.x += p.dx;
    p.y += p.dy;
    p.dy += 0.2;
    p.life--;
  });
  particles = particles.filter(p=>p.life>0);
}

/* SHAKE */
function addShake(amount){ shake = Math.max(shake, amount); }
function applyShake(){
  if(shake > 0){
    shakeX = (Math.random()-0.5) * shake;
    shake *= 0.85;
  } else { shake = 0; shakeX = 0; }
}

/* WORLD */
function generateChunk(){

  let startX = worldX + 800;

  for(let i=0;i<6;i++){
    let x = startX + i*130;
    let y = 180 + Math.random()*170;

    platforms.push({x,y,w:100,h:20});

    if(Math.random()<0.95){
      let r = Math.random();

      if(r < 0.2){
        enemies.push({
          x,y:y-20,w:20,h:20,
          dx:0,dy:0,
          type:"turret",
          hp:3,
          shootTimer:60
        });
      } else if(r < 0.45){
        enemies.push({
          x,y:y-18,w:24,h:18,
          dx:(Math.random()<0.5?-1:1)*0.6,
          dy:0,type:"shnail",hp:2
        });
    } else if(r < 0.7){
  enemies.push({
    x,y:y-20,w:20,h:20,
    dx:(Math.random()<0.5?-1:1)*1.2,
    dy:0,
    type:"normal"
  });
} else {
  enemies.push({
    x,y:y-20,w:22,h:22,
    dx:0,dy:0,
    type:"jumper",
    hp:2,
    jumpTimer:60
        });
      }
    }

    if(Math.random()<0.6) coins.push({x:x+30,y:y-20,taken:false});
    if(Math.random()<0.25) checkpoints.push({x,y:y-30});
    if(Math.random()<0.15) ammoCrates.push({x:x+50,y:y-20,taken:false});
  }

  worldX+=800;
}

function rect(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x &&
         a.y<b.y+b.h && a.y+a.h>b.y;
}

function update(){

  if(paused){
  drawPauseScreen();
  return requestAnimationFrame(update);
}
  
  handleGamepad();

  if(player.x>worldX-400) generateChunk();

  if(keys["ArrowRight"]||keys["KeyD"]){
    player.dx=player.speed; player.facing=1;
  } else if(keys["ArrowLeft"]||keys["KeyA"]){
    player.dx=-player.speed; player.facing=-1;
  } else player.dx*=0.8;

  player.dy+=gravity;
  player.x+=player.dx;
  player.y+=player.dy;

  if(player.y>canvas.height+200) respawn();

  let wasGrounded = player.grounded;
  player.grounded=false;
  player.canWallJump=false;

  platforms.forEach(p=>{
    if(rect(player,p)){
      if(player.dy>0){
        player.y=p.y-player.h;
        let impact = player.dy;
        player.dy=0;
        player.grounded=true;
        player.jumps=0;

        if(!wasGrounded){
          let count = Math.min(Math.abs(impact)/2, 8);
          spawnParticles(player.x+player.w/2, player.y+player.h, "white", count);
        }
      } else player.canWallJump=true;
    }
  });

  if(player.grounded) coyoteTime = 6;
  else coyoteTime--;

  if(jumpBuffer > 0){
    if(coyoteTime > 0 || player.jumps < 2){
      player.dy = -player.jump;
      player.jumps++;
      jumpBuffer = 0;
      coyoteTime = 0;
    }
    jumpBuffer--;
  }

  if((keys["ShiftLeft"]||keys["ShiftRight"]) && player.dash<=0){
    player.dx=player.facing*10;
    player.dash=60;
  }

  if(player.dash>0) player.dash--;

  enemies.forEach(e=>{
    e.dy+=gravity;
    e.x+=e.dx;
    e.y+=e.dy;
if(e.type === "jumper"){
  e.jumpTimer--;

  if(e.jumpTimer <= 0){
    let dx = player.x - e.x;

    e.dx = dx > 0 ? 2 : -2;   // jump toward player
    e.dy = -10;               // jump up

    e.jumpTimer = 90;         // reset timer
  }
}
    
    if(e.type === "turret"){
      e.shootTimer--;
      if(e.shootTimer <= 0){
        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let len = Math.hypot(dx,dy);
        dx/=len; dy/=len;

        enemyBullets.push({
          x:e.x+e.w/2,
          y:e.y+e.h/2,
          dx:dx*3, dy:dy*3
        });

        e.shootTimer = 90;
      }
    }

    let platformUnder=null;
    platforms.forEach(p=>{
      if(rect(e,p) && e.dy>0){
        e.y=p.y-e.h;
        e.dy=0;
        platformUnder=p;
      }
    });

    if(platformUnder && e.dx!==0){
      let frontX = e.dx>0 ? e.x+e.w+2 : e.x-2;
      if(frontX < platformUnder.x || frontX > platformUnder.x+platformUnder.w){
        e.dx*=-1;
      }
    }

    if(rect(player,e)){
      addShake(10);
      flash = 10;
      spawnParticles(player.x,player.y,"white");
      respawn();
    }
  });

  enemyBullets.forEach(b=>{
    b.x += b.dx;
    b.y += b.dy;

    if(rect(player,{x:b.x,y:b.y,w:6,h:6})){
      addShake(10);
      flash = 10;
      spawnParticles(player.x,player.y,"purple");
      respawn();
    }
  });

  enemyBullets = enemyBullets.filter(b =>
    b.x > cameraX-50 &&
    b.x < cameraX+canvas.width+50 &&
    b.y > -50 &&
    b.y < canvas.height+50
  );

  bullets.forEach(b=>{
    if(b.dead) return;
    b.x += b.dx;

    
    for(let e of enemies){
      if(rect({x:b.x,y:b.y,w:5,h:5},e)){
        addShake(5);
        flash = 6;
        spawnParticles(e.x,e.y,"lime");

        if(e.type==="shnail" || e.type==="turret" || e.type==="jumper"){
          e.hp--;
          if(e.hp<=0){
            spawnParticles(e.x,e.y,"green");
            e.dead=true;
            addScore(e.type==="turret"?30:20);
          }
        } else {
          e.dead=true;
          addScore(10);
        }

        b.dead = true;
        break;
      }
    }
  });
 
  bullets = bullets.filter(b=>!b.dead);
  enemies = enemies.filter(e=>!e.dead);

  coins.forEach(c=>{
    if(!c.taken && rect(player,{x:c.x,y:c.y,w:10,h:10})){
      c.taken=true;
      addScore(5);
    }
  });

  ammoCrates.forEach(a=>{
    if(!a.taken && rect(player,{x:a.x,y:a.y,w:12,h:12})){
      a.taken=true;
      player.ammo=Math.min(player.ammo+5,player.maxAmmo);
    }
  });

  checkpoints.forEach(cp=>{
    if(player.x>cp.x){
      player.spawnX=cp.x;
      player.spawnY=cp.y;
    }
  });

  let targetCamera = player.x - 200;
  cameraX += (targetCamera - cameraX) * 0.1;

  applyShake();
  updateParticles();
  updateHUD();

  draw();
  requestAnimationFrame(update);
}

function respawn(){
  player.x=player.spawnX;
  player.y=player.spawnY;
  player.dx=0;
  player.dy=0;
}

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(flash > 0){
    ctx.fillStyle="rgba(255,255,255,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    flash--;
  }

  ctx.save();
  ctx.translate(-cameraX + shakeX, 0);

  platforms.forEach(p=>{
    ctx.fillStyle="#3a5";
    ctx.fillRect(p.x,p.y,p.w,p.h);
  });

  coins.forEach(c=>{
    if(!c.taken){
      ctx.fillStyle="gold";
      ctx.fillRect(c.x,c.y,10,10);
    }
  });

  enemies.forEach(e=>{
    if(e.type==="shnail"){
      ctx.save();
      if(e.dx<0){
        ctx.scale(-1,1);
        ctx.translate(-e.x*2-e.w,0);
      }
      ctx.fillStyle="limegreen";
      ctx.fillRect(e.x,e.y-4,12,12);
      ctx.fillStyle="green";
      ctx.fillRect(e.x+4,e.y,4,4);
      ctx.fillStyle="darkgreen";
      ctx.fillRect(e.x+6,e.y+6,e.w,10);
      ctx.fillRect(e.x+e.w+4,e.y+4,2,4);
      ctx.fillRect(e.x+e.w+7,e.y+4,2,4);
      ctx.restore();
    }
      else if(e.type==="jumper"){
  ctx.fillStyle="cyan";
  ctx.fillRect(e.x,e.y,e.w,e.h);

  // little eyes (direction hint)
  ctx.fillStyle="black";
  let eyeX = e.dx >= 0 ? e.x + 14 : e.x + 4;
  ctx.fillRect(eyeX, e.y+5, 3, 3);
}
    else if(e.type==="turret"){
      ctx.fillStyle="purple";
      ctx.fillRect(e.x,e.y,e.w,e.h);
      ctx.fillStyle="violet";
      ctx.fillRect(e.x+e.w, e.y+6, 8, 4);
    }
else{ ctx.fillStyle="red"; 
      ctx.fillRect(e.x,e.y,e.w,e.h); } });

  enemyBullets.forEach(b=>{
    ctx.fillStyle="violet";
    ctx.fillRect(b.x,b.y,6,6);
  });

  checkpoints.forEach(cp=>{
    ctx.fillStyle="blue";
    ctx.fillRect(cp.x,cp.y,10,20);
  });

  ammoCrates.forEach(a=>{
    if(!a.taken){
      ctx.fillStyle="purple";
      ctx.fillRect(a.x,a.y,12,12);
    }
  });

  bullets.forEach(b=>{
    ctx.fillStyle="orange";
    ctx.fillRect(b.x,b.y,5,5);
  });

  particles.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,3,3);
  });

  ctx.fillStyle="lightgreen";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  ctx.restore();

  ctx.fillStyle="green";
  ctx.fillText("#shnails4life",10,20);
  ctx.fillText("Ammo: "+player.ammo+"/"+player.maxAmmo,10,60);
  ctx.fillText("I = Controls",10,40);
}
   function drawPauseScreen(){
  draw(); // draw current frame first

  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "lightgreen";
  ctx.font = "30px monospace";
  ctx.fillText("PAUSED", canvas.width/2 - 70, canvas.height/2);

  ctx.font = "14px monospace";
  ctx.fillText("Press ESC to resume", canvas.width/2 - 100, canvas.height/2 + 30);
}
</script>

async function loadMessages(){

let {data}=await client
.from("messages")
.select("*")
.order("created_at")
.limit(50);

data.forEach(m=>{
addMessage(
m.username,
m.message
);
});

}



client
.channel("chat-room")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"messages"
},
payload=>{

addMessage(
payload.new.username,
payload.new.message
);

}
)
.subscribe();



loadMessages();
const presenceChannel = client.channel("online-users");

presenceChannel
  .on("presence", { event: "sync" }, () => {
    const state = presenceChannel.presenceState();

    document.getElementById("onlineCount").textContent =
      "🟢 " + Object.keys(state).length + " Online";
  })
  .subscribe(async (status) => {
    if (status === "SUBSCRIBED") {
      await presenceChannel.track({
        username:
          document.getElementById("username").value || "Guest"
      });
    }
  });

  const minimizeBtn = document.getElementById("minimizeBtn");

let minimized = false;

minimizeBtn.onclick = () => {

    minimized = !minimized;

    const messages = document.getElementById("messages");
    const bottom = document.getElementById("chatBottom");
    const handle = document.getElementById("resizeHandle");

    if(minimized){

        messages.style.display = "none";
        bottom.style.display = "none";
        handle.style.display = "none";

        minimizeBtn.textContent = "➕";

    }else{

        messages.style.display = "";
        bottom.style.display = "";
        handle.style.display = "";

        minimizeBtn.textContent = "➖";

    }

};

        const chatBox = document.getElementById("chatBox");
const resizeHandle = document.getElementById("resizeHandle");

let resizing = false;

resizeHandle.addEventListener("mousedown", () => {

    resizing = true;

});

document.addEventListener("mouseup", () => {

    resizing = false;

});

document.addEventListener("mousemove", e => {

    if(!resizing) return;

    let rect = chatBox.getBoundingClientRect();

    let newHeight = window.innerHeight - e.clientY;

    newHeight = Math.max(220, Math.min(700, newHeight));

    chatBox.style.height = newHeight + "px";

    document.getElementById("messages").style.height =
        (newHeight - 120) + "px";

});
