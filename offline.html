<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Device Offline</title>
  <style type="text/css"> 
:root{
    --bg1:#041b12;
    --bg2:#0f5132;
    --bg3:#22c55e;
    --text:#ffffff;
    --glass:rgba(255,255,255,.08);
    --border:rgba(255,255,255,.15);
    --button:#22c55e;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
    color:var(--text);
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        -45deg,
        #041b12,
        #0f5132,
        #16a34a,
        #22c55e
    );
    background-size:400% 400%;
    animation:bg 15s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    position:relative;
    width:320px;
    padding:40px;
    border-radius:25px;
    background:var(--glass);
    backdrop-filter:blur(20px);
    border:1px solid var(--border);
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
    animation:appear .8s ease;
}

@keyframes appear{
    from{
        opacity:0;
        transform:translateY(40px) scale(.95);
    }
    to{
        opacity:1;
        transform:none;
    }
}

h1{
    margin:18px 0 5px;
    font-size:32px;
}

p{
    opacity:.8;
    line-height:1.5;
    margin-bottom:30px;
}

button{
    padding:14px 38px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    font-size:17px;
    transition:.25s;
    box-shadow:0 0 30px rgba(34,197,94,.45);
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 40px rgba(34,197,94,.8);
}

button:active{
    transform:scale(.96);
}

    #miniGame{
    margin:20px auto;
    display:block;
    border:2px solid rgba(255,255,255,.15);
    border-radius:12px;
    background:#0b2012;
    image-rendering:pixelated;
}

#logo{
    width:120px;
    height:120px;
    margin:auto;
}

#logo svg{
    width:100%;
    height:100%;
}

#logo path{
    fill:white;
}

.particle{
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:#7CFF9B;
    box-shadow:0 0 10px #7CFF9B;
    opacity:.3;
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120vh);
    }
}
  </style>
</head>
<body>
<div class="container">

<div id="logo">
<svg viewBox="0 0 24 24">
<path d="M12 18a2 2 0 110 4 2 2 0 010-4zm5.66-2.34l-1.41 1.41A6 6 0 0012 15a6 6 0 00-4.24 1.76l-1.42-1.41A8 8 0 0112 13a8 8 0 015.66 2.66zm2.83-2.83l-1.41 1.41A10 10 0 0012 10a10 10 0 00-7.07 2.93L3.51 11.5A12 12 0 0112 8a12 12 0 018.49 3.5zm2.83-2.83l-1.41 1.41A14 14 0 0012 5a14 14 0 00-9.9 4.1L.68 7.69A16 16 0 0112 3a16 16 0 0111.32 4.69z"/>
</svg>
</div>

<h1>Offline</h1>

<p id="message">
No internet connection.<br>
#shnails4life<br>


I spent a long time making this
</p>

<canvas id="miniGame" width="320" height="220"></canvas>

<p id="score">Leaves: 0</p>

<button onclick="gonative.webview.reload()">
Retry
</button>

</div>
  <script>
    var message = document.getElementById('message');
    var retryButton = document.getElementById('retryButton')
    if (['ko', 'ko-kr', 'ko-kp'].indexOf(navigator.language.toLowerCase()) > -1) {
      // Korean
      message.innerHTML = '<p>인터넷 연결이 끊겼습니다.<br/>연결하고 다시 시도하시길 바랍니다.</p>';
      retryButton.innerText = '괜찮아';
    }
    function updateDarkMode(){
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
      else {
        document.documentElement.setAttribute("data-theme", "light");
      } 
    }
    updateDarkMode();
    if(window.matchMedia){
      window.matchMedia('(prefers-color-scheme: dark)')
        .addEventListener('change', updateDarkMode);
    }
  </script>
  <script>
    const canvas=document.getElementById("miniGame");
const ctx=canvas.getContext("2d");

const shnail={
    x:140,
    y:185,
    w:40,
    h:20,
    speed:4
};

const keys={};

let leaves=[];
let score=0;
let misses=0;

document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

setInterval(()=>{

    leaves.push({
        x:Math.random()*300,
        y:-10,
        dy:2+Math.random()*2
    });

},700);

function update(){

    if(keys["ArrowLeft"]||keys["KeyA"])
        shnail.x-=shnail.speed;

    if(keys["ArrowRight"]||keys["KeyD"])
        shnail.x+=shnail.speed;

    shnail.x=Math.max(0,Math.min(canvas.width-shnail.w,shnail.x));

    leaves.forEach(l=>{

        l.y+=l.dy;

        if(
            l.x<shnail.x+shnail.w &&
            l.x+8>shnail.x &&
            l.y<shnail.y+shnail.h &&
            l.y+8>shnail.y
        ){
            l.dead=true;
            score++;
        }

        if(l.y>canvas.height){
            l.dead=true;
            misses++;
        }

    });

    leaves=leaves.filter(l=>!l.dead);

    draw();

    requestAnimationFrame(update);

}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // leaves
    ctx.fillStyle="#22c55e";

    leaves.forEach(l=>{
        ctx.fillRect(l.x,l.y,8,8);
    });

    // SHNAIL
    ctx.fillStyle="white";
    ctx.fillRect(shnail.x,shnail.y,16,16);
    ctx.fillStyle="#ddd";
    ctx.fillRect(shnail.x+8,shnail.y+8,24,10);

    ctx.fillStyle="white";
    ctx.fillRect(shnail.x+28,shnail.y+4,2,4);
    ctx.fillRect(shnail.x+32,shnail.y+4,2,4);

    document.getElementById("score").textContent=
        `Leaves: ${score}   Misses: ${misses}/5`;

    if(misses>=5){

        ctx.fillStyle="white";
        ctx.font="18px monospace";
        ctx.fillText("GAME OVER",90,110);

        return;

    }

}

update();

window.addEventListener("online",()=>{
    location.reload();
});
    
for(let i=0;i<60;i++){

    const p=document.createElement("div");

    p.className="particle";

    p.style.left=Math.random()*100+"vw";

    p.style.animationDuration=8+Math.random()*12+"s";

    p.style.animationDelay=-Math.random()*20+"s";

    p.style.opacity=Math.random()*.5;

    p.style.transform=`scale(${Math.random()*2+.5})`;

    document.body.appendChild(p);

}
</script>
</body>
</html>
