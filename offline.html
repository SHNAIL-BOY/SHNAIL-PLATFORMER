<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Device Offline</title>
  <style type="text/css"> 
:root{
    --bg1:#041b12;
    --bg2:#0f5132;
    --bg3:#22c55e;
    --text:#ffffff;
    --glass:rgba(255,255,255,.08);
    --border:rgba(255,255,255,.15);
    --button:#22c55e;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
    color:var(--text);
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        -45deg,
        #041b12,
        #0f5132,
        #16a34a,
        #22c55e
    );
    background-size:400% 400%;
    animation:bg 15s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    position:relative;
    width:320px;
    padding:40px;
    border-radius:25px;
    background:var(--glass);
    backdrop-filter:blur(20px);
    border:1px solid var(--border);
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
    animation:appear .8s ease;
}

@keyframes appear{
    from{
        opacity:0;
        transform:translateY(40px) scale(.95);
    }
    to{
        opacity:1;
        transform:none;
    }
}

h1{
    margin:18px 0 5px;
    font-size:32px;
}

p{
    opacity:.8;
    line-height:1.5;
    margin-bottom:30px;
}

button{
    padding:14px 38px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    font-size:17px;
    transition:.25s;
    box-shadow:0 0 30px rgba(34,197,94,.45);
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 40px rgba(34,197,94,.8);
}

button:active{
    transform:scale(.96);
}

    #gameBox{
    margin-top:25px;
}

#game{
    width:280px;
    height:170px;
    border-radius:16px;
    background:linear-gradient(#7dd3fc,#22c55e);
    border:2px solid rgba(255,255,255,.15);
    image-rendering:pixelated;
    box-shadow:0 0 25px rgba(0,0,0,.25);
}

#gameText{
    margin-top:8px;
    font-size:13px;
    opacity:.7;
}

#logo{
    width:120px;
    height:120px;
    margin:auto;
}

#logo svg{
    width:100%;
    height:100%;
}

#logo path{
    fill:white;
}

.particle{
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:#7CFF9B;
    box-shadow:0 0 10px #7CFF9B;
    opacity:.3;
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120vh);
    }
}
  </style>
</head>
<body>
<div class="container">

<div id="logo">
<svg viewBox="0 0 24 24">
<path d="M12 18a2 2 0 110 4 2 2 0 010-4zm5.66-2.34l-1.41 1.41A6 6 0 0012 15a6 6 0 00-4.24 1.76l-1.42-1.41A8 8 0 0112 13a8 8 0 015.66 2.66zm2.83-2.83l-1.41 1.41A10 10 0 0012 10a10 10 0 00-7.07 2.93L3.51 11.5A12 12 0 0112 8a12 12 0 018.49 3.5zm2.83-2.83l-1.41 1.41A14 14 0 0012 5a14 14 0 00-9.9 4.1L.68 7.69A16 16 0 0112 3a16 16 0 0111.32 4.69z"/>
</svg>
</div>

<h1>Offline</h1>

<p id="message">
No internet connection.<br>
#shnails4life<br>


I spent a long time making this
</p>

<button onclick="gonative.webview.reload()">
Retry
</button>

  <br><br>

<div id="gameBox">
    <canvas id="game" width="280" height="170"></canvas>

    <div id="gameText">
        ← → Move &nbsp;&nbsp; Space Jump
    </div>
</div>

      <script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const keys={};

addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

const player={
x:30,
y:0,
w:16,
h:18,
dx:0,
dy:0,
ground:false
};

const platforms=[
{x:0,y:150,w:280,h:20},
{x:90,y:120,w:60,h:10},
{x:180,y:90,w:70,h:10}
];

const coin={
x:210,
y:60,
r:6
};

let score=0;

function resetCoin(){
coin.x=30+Math.random()*220;
coin.y=30+Math.random()*90;
}

function update(){

if(keys["ArrowLeft"]) player.dx=-2.5;
else if(keys["ArrowRight"]) player.dx=2.5;
else player.dx*=0.8;

if((keys[" "]||keys["ArrowUp"])&&player.ground){
player.dy=-7;
player.ground=false;
}

player.dy+=0.35;

player.x+=player.dx;
player.y+=player.dy;

player.ground=false;

for(const p of platforms){

if(
player.x+player.w>p.x &&
player.x<p.x+p.w &&
player.y+player.h>p.y &&
player.y+player.h-player.dy<=p.y
){
player.y=p.y-player.h;
player.dy=0;
player.ground=true;
}

}

if(player.x<0)player.x=0;
if(player.x+player.w>280)player.x=280-player.w;

if(player.y>200){
player.x=30;
player.y=0;
player.dy=0;
}

const cx=player.x+8;
const cy=player.y+9;

if(Math.hypot(cx-coin.x,cy-coin.y)<12){
score++;
resetCoin();
}

}

function draw(){

ctx.clearRect(0,0,280,170);

ctx.fillStyle="#58c36a";
ctx.fillRect(0,150,280,20);

ctx.fillStyle="#3e8e41";
for(const p of platforms){
ctx.fillRect(p.x,p.y,p.w,p.h);
}

ctx.fillStyle="#ffd700";
ctx.beginPath();
ctx.arc(coin.x,coin.y,coin.r,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="#ffffff";
ctx.fillRect(player.x,player.y,player.w,player.h);

ctx.fillStyle="white";
ctx.font="12px Arial";
ctx.fillText("Coins: "+score,8,15);

}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

resetCoin();
loop();

</script>

</div>
  <script>
    var message = document.getElementById('message');
    var retryButton = document.getElementById('retryButton')
    if (['ko', 'ko-kr', 'ko-kp'].indexOf(navigator.language.toLowerCase()) > -1) {
      // Korean
      message.innerHTML = '<p>인터넷 연결이 끊겼습니다.<br/>연결하고 다시 시도하시길 바랍니다.</p>';
      retryButton.innerText = '괜찮아';
    }
    function updateDarkMode(){
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
      else {
        document.documentElement.setAttribute("data-theme", "light");
      } 
    }
    updateDarkMode();
    if(window.matchMedia){
      window.matchMedia('(prefers-color-scheme: dark)')
        .addEventListener('change', updateDarkMode);
    }
  </script>
  <script>
for(let i=0;i<60;i++){

    const p=document.createElement("div");

    p.className="particle";

    p.style.left=Math.random()*100+"vw";

    p.style.animationDuration=8+Math.random()*12+"s";

    p.style.animationDelay=-Math.random()*20+"s";

    p.style.opacity=Math.random()*.5;

    p.style.transform=`scale(${Math.random()*2+.5})`;

    document.body.appendChild(p);

}
</script>
</body>
</html>
